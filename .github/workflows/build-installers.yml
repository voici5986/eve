name: Build And Release Installers

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish a GitHub Release after building installers
        required: false
        default: false
        type: boolean
      release_tag:
        description: Release tag to create when publishing manually (for example v0.3.6)
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis -y
        shell: pwsh

      - name: Expose NSIS on PATH
        if: runner.os == 'Windows'
        run: |
          $nsisBin = "${env:ProgramFiles(x86)}\NSIS"
          if (!(Test-Path (Join-Path $nsisBin "makensis.exe"))) {
            throw "makensis.exe not found under $nsisBin"
          }
          $nsisBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Verify makensis
        if: runner.os == 'Windows'
        run: makensis /VERSION
        shell: pwsh

      - name: Install dependencies
        run: uv sync

      - name: Build installer
        run: uv run --with pyinstaller scripts/build_installers.py

      - name: Report macOS signing mode
        if: runner.os == 'macOS'
        run: |
          if [[ -n "${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}" ]]; then
            echo "macOS signing secrets detected. Signing flow is reserved for future enablement."
          else
            echo "macOS signing secrets not configured. Building unsigned artifacts by design."
          fi
        shell: bash

      - name: Validate installer outputs
        run: |
          python - <<'PY'
          from pathlib import Path
          import platform

          root = Path("dist/installers")
          expected = {
              "Darwin": ["*.app", "*.pkg"],
              "Linux": ["*.deb"],
              "Windows": ["*.exe"],
          }[platform.system()]

          missing = []
          for pattern in expected:
              matches = sorted(path.name for path in root.glob(pattern))
              if matches:
                  print(f"{pattern}: {', '.join(matches)}")
              else:
                  missing.append(pattern)

          if missing:
              raise SystemExit(f"Missing expected installer outputs: {', '.join(missing)}")
          PY
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eve-installer-${{ runner.os }}
          path: dist/installers/*

  release:
    name: Create GitHub Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release && inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: eve-installer-*
          merge-multiple: true
          path: dist/installers

      - name: Generate checksums
        run: |
          find dist/installers -maxdepth 1 -type f \( -name '*.deb' -o -name '*.exe' -o -name '*.pkg' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > dist/installers/SHA256SUMS.txt

      - name: Create Release and upload installers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/installers/*.deb
            dist/installers/*.exe
            dist/installers/*.pkg
            dist/installers/SHA256SUMS.txt
